syntax = "proto3";

package user;

// Directory for Go files
option go_package = "services/pkg/proto/user";

// Message Definition
message UserRequest {
    string username = 1;
    string email = 2;
    string password_hash = 3;
    string bio = 4;
    string avatar_url = 5;
}

message UserResponse {
    uint32 id = 1;
    string username = 2;
    string email = 3;
    string password_hash = 4;
    string bio = 5;
    string avatar_url = 6;
    string created_at = 7;
}

message UserRequestById {
    string id = 1;
}

message DeleteUserResponse {
    bool success = 1;
}

// Service Definition
service UserService {
    // Create
    rpc CreateUser (UserRequest) returns (UserResponse);

    // Read
    rpc GetUserByID (UserRequestById) returns (UserResponse);

    // Update
    rpc UpdateUser (UserRequest) returns (UserResponse);

    // Delete
    rpc DeleteUser (UserRequestById) returns (DeleteUserResponse);

}