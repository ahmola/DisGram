syntax = "proto3";

package follow;

option go_package = "services/pkg/proto/follow";

// Message Definition
message FollowRequestById{
    string id = 1;
}

message FollowRequest{
    uint32 followee_id = 1;
    uint32 follower_id = 2;
}

message FollowResponse{
    uint32 followee_id = 1;
    uint32 follower_id = 2;
}

message IdListResponse{
    repeated uint32 id_list = 1;
}

message DeleteFollowResponse {
    bool success = 1;
}

// Service Definition
service FollowService{
    // Create
    rpc CreateFollow (FollowRequest) returns (FollowResponse);

    // Read
    rpc GetFollow (FollowRequestById) returns (FollowResponse);
    rpc GetFollowersByFolloweeID (FollowRequestById) returns (IdListResponse);
    rpc GetFolloweesByFollowerID (FollowRequestById) returns (IdListResponse);

    // Delete
    rpc DeleteFollow (FollowRequestById) returns (DeleteFollowResponse);

}