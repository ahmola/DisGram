services:
  mysql:
    environment:
      - MYSQL_ROOT_PASSWORD=1234
    image: mysql:8.2.0
    container_name: mysql
    restart: always
    ports:
      - "3306:3306"
    volumes:
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - service-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "mysql", "-u", "root", "--password=1234"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
