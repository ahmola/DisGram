services:
  mysql:
    environment:
      - MYSQL_ROOT_PASSWORD=1234
    image: mysql:8.2.0
    container_name: mysql
    restart: always
    ports:
      - "3306:3306"
    volumes:
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - service-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "mysql", "-u", "root", "--password=1234"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  user-service:
    depends_on:
      mysql:
        condition: service_healthy
    build: 
      context: .
      dockerfile: ./user-service/Dockerfile
    container_name: user-service
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      DB_DSN: "root:1234@tcp(mysql:3306)/user?charset=utf8mb4&parseTime=True&loc=Local"
      SERVER_PORT: ":8080"
      GRPC_PORT: ":9090"
    networks:
      - service-network
  
