syntax = "proto3";

package dev.ahmola.photogram.common_domain.proto;

option java_multiple_files = true;
option java_package = "dev.ahmola.photogram.common_domain.proto";
option java_outer_classname = "CommentProto";

//Service Definition
service CommentGrpcService {
    rpc ReadCommentsByUserId (ReadCommentsByUserIdRequest) returns (ReadCommentsByUserIdResponse);
    rpc ReadCommentsByPostId (ReadCommentsByPostIdRequest) returns (ReadCommentsByPostIdResponse);

    rpc CreateComment (CreateCommentRequest) returns (CreateCommentResponse);

    rpc UpdateComment (UpdateCommentRequest) returns (UpdateCommentResponse);

    rpc DeleteComment (DeleteCommentRequest) returns (DeleteCommentResponse);
}

/*
* Message Definition
*/
message Comment {
    int64 id = 1;
    int64 userId = 2;
    int64 postId = 3;
    string content = 4;
    string createdAt = 5;
}

// Read
message ReadCommentsByUserIdRequest {
    int64 userId = 1;
}

message ReadCommentsByUserIdResponse {
    repeated Comment comments = 1;
}

message ReadCommentsByPostIdRequest {
    int64 postId = 1;
}

message ReadCommentsByPostIdResponse {
    repeated Comment comments = 1;
}

// Create
message CreateCommentRequest {
    int64 userId = 1;
    int64 postId = 2;
    string content = 3;
}

message CreateCommentResponse {
    Comment comment = 1;
}

// Update
message UpdateCommentRequest {
    int64 userId = 1;
    int64 postId = 2;
    string content = 3;
}

message UpdateCommentResponse {
    Comment comment = 1;
}

// Delete
message DeleteCommentRequest {
    int64 id = 1;
}

message DeleteCommentResponse {
    int64 status = 1;
    string message = 2;
}