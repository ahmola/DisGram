# This is a sample server block for testing purposes.
# It serves a simple index.html file.
server {
    listen 80 default_server;
    server_name _;

    access_log /dev/stdout access_log_json;

    root /usr/share/nginx/html/example;

    location / {
        index index.html;
        try_files $uri $uri/ =404;
    }

}

# API Gateway Reverse Proxy
# Precisely, this is k8s Ingress
# This server block acts as a reverse proxy for the API gateway.
server {
    listen 8081;
    server_name gateway.internal;

    access_log /dev/stdout access_log_json;

    location /api/ {
        # Example of IP-based access control.
        # You can restrict access to specific IP addresses or ranges.
        # allow <ip_address>;
        # deny all;

        proxy_pass http://gateway_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Static Resource Server
# This server block serves static assets like images, CSS, and JavaScript.
# It's configured to be accessible from the outside world.
server {
    listen 8082;
    server_name origin.external;

    access_log /dev/stdout access_log_json;

    location /static/ {
        alias /usr/share/nginx/html/static/;
        
        # Add caching headers for static assets to improve client-side performance.
        expires 1h;
        add_header Cache-Control "public";
    }
}